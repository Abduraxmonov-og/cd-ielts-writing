<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS Writing Practice — Select Tasks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Layout ── */
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 58px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-secondary);
      background: transparent;
      letter-spacing: 0.02em;
    }

    .mode-btn.active-practice {
      background: var(--accent);
      color: #fff;
    }

    .mode-btn.active-exam {
      background: var(--red);
      color: #fff;
    }

    /* ── Exam mode overlay ── */
    .exam-mode-banner {
      display: none;
      background: var(--red-dim);
      border-bottom: 1px solid rgba(249,107,107,0.25);
      padding: 10px 28px;
      font-size: 13px;
      color: var(--red);
      font-weight: 500;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .exam-mode-banner.visible { display: flex; }

    /* ── Two-column workspace ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    .task-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .task-panel:last-child { border-right: none; }

    /* ── Panel header ── */
    .panel-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-family: var(--font-mono);
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }

    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Card list ── */
    .card-list {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Task card ── */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .task-card:hover {
      border-color: var(--border-light);
      background: var(--surface-2);
      transform: translateY(-1px);
    }

    .task-card.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .task-card.selected::after {
      content: '✓';
      position: absolute;
      top: 12px; right: 14px;
      width: 20px; height: 20px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }

    .task-card.custom-card {
      border-style: dashed;
      border-color: var(--border-light);
    }

    .task-card.custom-card:hover {
      border-color: var(--purple);
      background: var(--purple-dim);
    }

    .task-card.custom-card.selected {
      border-color: var(--purple);
      background: var(--purple-dim);
    }

    .task-card.custom-card.selected::after {
      background: var(--purple);
    }

    .card-type {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 7px;
      line-height: 1.35;
      padding-right: 28px;
    }

    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }

    /* ── Exam mode locked state ── */
    .exam-locked {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .lock-icon {
      font-size: 36px;
      opacity: 0.4;
    }

    .exam-locked strong { color: var(--text-secondary); display: block; margin-bottom: 4px; font-size: 14px; }

    /* ── Bottom bar ── */
    .bottombar {
      height: 64px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      flex-shrink: 0;
    }

    .selection-summary {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 20px;
    }

    .selection-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .selection-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border-light);
    }

    .selection-dot.filled { background: var(--accent); }
    .selection-dot.filled-custom { background: var(--purple); }

    .selection-label { font-family: var(--font-mono); }

    /* ── Preview Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      width: 560px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow);
      transform: scale(0.96) translateY(8px);
      transition: transform 0.2s ease;
    }

    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .modal-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .modal-close {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); border-color: var(--border-light); }

    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-image {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      background: var(--surface-2);
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    .modal-image img {
      width: 100%;
      border-radius: var(--radius-sm);
      display: block;
    }

    .modal-question {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-line;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Candidate ID chip ── */
    .candidate-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">W</div>
      IELTS Writing Practice
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active-practice" id="btn-practice" onclick="setMode('practice')">Practice Mode</button>
      <button class="mode-btn" id="btn-exam" onclick="setMode('exam')">Exam Mode</button>
    </div>

    <div class="candidate-id" id="candidate-id-display">Loading...</div>
  </header>

  <!-- Exam mode warning banner -->
  <div class="exam-mode-banner" id="exam-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Exam Mode — tasks will be randomly assigned. You will not be able to preview or change them before starting.
  </div>

  <!-- Main workspace -->
  <main class="workspace">

    <!-- Task 1 Panel -->
    <div class="task-panel" id="panel-task1">
      <div class="panel-header">
        <div class="panel-title">Task 1 — Academic Writing</div>
        <div class="filter-bar" id="filter-task1">
          <button class="filter-chip active" data-filter="all" onclick="filterCards(1, 'all', this)">All</button>
          <button class="filter-chip" data-filter="line_graph" onclick="filterCards(1, 'line_graph', this)">Line Graph</button>
          <button class="filter-chip" data-filter="bar_chart" onclick="filterCards(1, 'bar_chart', this)">Bar Chart</button>
          <button class="filter-chip" data-filter="pie_chart" onclick="filterCards(1, 'pie_chart', this)">Pie Chart</button>
          <button class="filter-chip" data-filter="table" onclick="filterCards(1, 'table', this)">Table</button>
          <button class="filter-chip" data-filter="map" onclick="filterCards(1, 'map', this)">Map</button>
          <button class="filter-chip" data-filter="process_diagram" onclick="filterCards(1, 'process_diagram', this)">Process</button>
          <button class="filter-chip" data-filter="mixed" onclick="filterCards(1, 'mixed', this)">Mixed</button>
        </div>
      </div>
      <div class="card-list" id="cards-task1"></div>
    </div>

    <!-- Task 2 Panel -->
    <div class="task-panel" id="panel-task2">
      <div class="panel-header">
        <div class="panel-title">Task 2 — Essay Writing</div>
        <div class="filter-bar" id="filter-task2">
          <button class="filter-chip active" data-filter="all" onclick="filterCards(2, 'all', this)">All</button>
          <button class="filter-chip" data-filter="opinion" onclick="filterCards(2, 'opinion', this)">Opinion</button>
          <button class="filter-chip" data-filter="discussion" onclick="filterCards(2, 'discussion', this)">Discussion</button>
          <button class="filter-chip" data-filter="problem_solution" onclick="filterCards(2, 'problem_solution', this)">Problem-Solution</button>
          <button class="filter-chip" data-filter="direct_question" onclick="filterCards(2, 'direct_question', this)">Direct Question</button>
          <button class="filter-chip" data-filter="advantages_disadvantages" onclick="filterCards(2, 'advantages_disadvantages', this)">Adv / Disadv</button>
        </div>
      </div>
      <div class="card-list" id="cards-task2"></div>
    </div>

  </main>

  <!-- Bottom bar -->
  <footer class="bottombar">
    <div class="selection-summary">
      <div class="selection-item">
        <div class="selection-dot" id="dot-task1"></div>
        <span class="selection-label" id="label-task1">Task 1: not selected</span>
      </div>
      <div class="selection-item">
        <div class="selection-dot" id="dot-task2"></div>
        <span class="selection-label" id="label-task2">Task 2: not selected</span>
      </div>
    </div>
    <button class="btn btn-primary" id="start-btn" disabled onclick="startExam()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Start Writing Test
    </button>
  </footer>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="preview-modal" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-meta" id="modal-meta"></div>
          <div class="modal-title" id="modal-title"></div>
          <div id="modal-tags"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-image" id="modal-image-wrap"></div>
        <p class="modal-question" id="modal-question"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-select-btn" onclick="confirmSelection()">Select This Task</button>
      </div>
    </div>
  </div>

  <script src="selection.js"></script>
</body>
</html>
